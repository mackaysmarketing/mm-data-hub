views:
  - name: gp_settlement_load
    title: GP Settlement (Load Grain)
    description: >-
      Governed FreshTrack grower-pool settlement at LOAD grain — the load-to-settlement lineage
      NetSuite cannot provide (dispatch_load_id joins settlement back to dispatch). Base cube is
      private; all access flows through this view. RLS: row-filtered to the caller's consignor
      (app_metadata.consignor_id) in cube.js queryRewrite, anchored on the SCHEDULE consignor;
      internal unscoped; neither -> fail closed. ADDITIVE — never redefines a dispatch or
      settlement metric.
    public: true

    cubes:
      - join_path: gp_settlement_load_fact
        includes:
          - gp_load_count
          - gp_load_gross_sales
          - gp_load_total_deductions
          - gp_load_net_paid
          - grower_key
          - schedule_id
          - dispatch_load_id
          - load_no
          - original_dispatch_load_id
